services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: journey-portfolio
    restart: unless-stopped
    networks:
      - traefik_network
    expose:
      - "80"
    # healthcheck:
    #   test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
    #   interval: 30s
    #   timeout: 3s
    #   retries: 3
    #   start_period: 5s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_network"
      - "traefik.http.routers.journey-portfolio.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.journey-portfolio.entrypoints=web"
      - "traefik.http.services.journey-portfolio.loadbalancer.server.port=80"

networks:
  traefik_network:
    external: true  
